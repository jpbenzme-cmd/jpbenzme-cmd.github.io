<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzLive Asia - Tap & Earn</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #7C4DFF; --hot-pink: #FF4081; --bg: #050510; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; overflow-x: hidden; text-align: center; }

        /* The Birthday Pop-up (Overlay) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: white; color: black; width: 85%; max-width: 350px;
            padding: 30px; border-radius: 25px; animation: slideUp 0.4s ease-out;
        }
        .confirm-btn {
            background: #D1C4E9; color: white; border: none; width: 100%; padding: 15px;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /* The Game Container */
        #game-section { padding: 40px 20px; }
        #tap-circle {
            width: 150px; height: 150px; background: linear-gradient(45deg, var(--primary), var(--hot-pink));
            border-radius: 50%; margin: 30px auto; display: flex; align-items: center; justify-content: center;
            font-size: 50px; box-shadow: 0 0 30px rgba(124, 77, 255, 0.4); cursor: pointer;
        }
        
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="overlay" id="popup">
        <div class="modal">
            <h2 style="font-size: 18px;">Nice to meet you! What is your birthday?</h2>
            <p style="color: #666; font-size: 13px; margin-bottom: 20px;">To provide you with a better product experience.</p>
            <div style="background: #F1F3F4; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left; font-weight: bold;">
                Choose your birthday <span style="float:right">></span>
            </div>
            <button class="confirm-btn" onclick="closePopup()">Confirm</button>
        </div>
    </div>

    <div id="game-section">
        <h1 style="color: var(--hot-pink);">TAP TO UNLOCK</h1>
        <p>Complete 20 taps to claim 100 Coins!</p>
        
        <div id="tap-circle" onclick="handleTap()">👆</div>
        
        <h2 style="font-size: 24px;">Taps: <span id="count" style="color: #00E676;">0</span> / 20</h2>

        <a href="https://www.facecast.live/invite/4C1OFD" id="claim-btn" style="display: none; background: #00E676; color: white; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 20px;">
            CLAIM 100 COINS
        </a>
    </div>

    <script>
        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }

        let taps = 0;
        function handleTap() {
            if (taps < 20) {
                taps++;
                document.getElementById('count').innerText = taps;
                // Vibration effect for Android
                if (navigator.vibrate) navigator.vibrate(50);
            }
            if (taps === 20) {
                document.getElementById('tap-circle').style.display = 'none';
                document.getElementById('claim-btn').style.display = 'inline-block';
            }
        }
    </script>
</body>
</html>
