<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Benz Rewards Portal</title>
    <style>
        :root { --green: #00ff00; --hot-pink: #ff69b4; }
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #tap-circle { width: 150px; height: 150px; background: var(--green); border-radius: 50%; margin: 50px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; font-weight: bold; transition: 0.1s; }
        #tap-circle:active { transform: scale(0.9); }
        .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top: 4px solid var(--green); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #user-loader { display: none; margin-top: 20px; }
        #ad-container { margin: 20px 0; min-height: 50px; }
    </style>
</head>
<body>

    <div id="game-section">
        <h1 style="color: var(--hot-pink);">REWARDS PORTAL</h1>
        <p style="color: #888;">Complete 20 taps to sync rewards</p>
        
        <div id="tap-circle" onclick="handleTap()">TAP</div>
        <h2 style="font-weight: 300;">Sync: <span id="count" style="color: var(--green); font-weight: bold;">0</span>/20</h2>

        <div id="user-loader">
            <div class="spinner"></div>
            <p>Finalizing Ad-Credit Sync...</p>
        </div>
    </div>

    <div id="ad-container">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-app-pub-4925839857210708"
             data-ad-slot="5255655743"></ins>
        <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
    </div>

    <div style="margin: 30px 0;">
        <script async="async" data-cfasync="false" src="//pl25023315.profitablecpmratenetwork.com/cc87fb03b620734d3027d583de76bd26/invoke.js"></script>
        <div id="container-cc87fb03b620734d3027d583de76bd26"></div>
    </div>

    <footer style="margin-top: 50px; padding: 20px; font-size: 12px; color: #555;">
        <hr style="border: 0; border-top: 1px solid #222; margin-bottom: 20px;">
        <a href="privacy-policy.html" style="color: #888; text-decoration: none;">Privacy Policy</a>
        <p style="margin-top: 10px;">&copy; 2026 JP Benz Digital Systems</p>
    </footer>

    <script>
        let taps = 0;
        function handleTap() {
            if (taps < 20) {
                taps++;
                document.getElementById('count').innerText = taps;
                if (navigator.vibrate) navigator.vibrate(40);
            }
            if (taps === 20) {
                startRedirect();
            }
        }

        function startRedirect() {
            document.getElementById('tap-circle').style.display = 'none';
            document.getElementById('user-loader').style.display = 'block';
            setTimeout(() => {
                window.location.href = "page2.html";
            }, 3500); 
        }
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-4925839857210708" crossorigin="anonymous"></script>

</body>
</html>
