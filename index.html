<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuzzCast - Live Social</title>
    <style>
        :root { --primary: #7C4DFF; --bg: #0a0a1a; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }

        /* The Background Grid (Blurred) */
        .grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px;
            filter: blur(8px); pointer-events: none; /* Keeps it non-clickable until verified */
        }
        .box { background: #222; height: 200px; border-radius: 10px; background-size: cover; background-position: center; }

        /* The Pop-up Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100;
        }

        /* The White Modal (Creamy Pop-up) */
        .modal {
            background: white; color: black; width: 85%; max-width: 350px;
            padding: 30px; border-radius: 25px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease-out;
        }

        h2 { font-size: 20px; margin: 0 0 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }

        .input-box {
            background: #F1F3F4; padding: 15px; border-radius: 15px;
            margin-bottom: 20px; display: flex; justify-content: space-between;
            color: #333; font-weight: bold; cursor: pointer;
        }

        .confirm-btn {
            background: #D1C4E9; /* Light purple like your screenshot */
            color: white; border: none; width: 100%; padding: 15px;
            border-radius: 50px; font-size: 18px; font-weight: bold;
            cursor: pointer; text-decoration: none; display: block;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="grid">
        <div class="box" style="background-image: url('https://i.pravatar.cc/300?u=1')"></div>
        <div class="box" style="background-image: url('https://i.pravatar.cc/300?u=2')"></div>
        <div class="box" style="background-image: url('https://i.pravatar.cc/300?u=3')"></div>
        <div class="box" style="background-image: url('https://i.pravatar.cc/300?u=4')"></div>
    </div>

    <div class="overlay">
        <div class="modal">
            <h2>Nice to meet you! What is your birthday?</h2>
            <p>To provide you with a better product experience.</p>
            
            <div class="input-box">
                <span>Choose your birthday</span>
                <span>></span>
            </div>

            <a href="YOUR_BUZZCAST_LINK_HERE" class="confirm-btn">Confirm</a>
            
            <p style="margin-top:15px; font-size:12px;">Already have an account? <span style="color:#7C4DFF">Login</span></p>
        </div>
    </div>

</body>
</html>
